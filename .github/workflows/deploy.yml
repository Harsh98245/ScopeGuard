# =============================================================================
# Deploy — runs only on push to main, after CI passes.
# =============================================================================
# Vercel handles the actual build + deploy via its GitHub integration. This
# workflow is reserved for the post-deploy steps that don't belong on Vercel:
#   - Apply Prisma migrations against production.
#   - Smoke-test the deployed URL.
# =============================================================================

name: Deploy

on:
  workflow_run:
    workflows: ['CI']
    branches: [main]
    types: [completed]

jobs:
  migrate:
    name: Apply migrations
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DATABASE_POOL_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

  smoke:
    name: Post-deploy smoke check
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - name: Hit /api/health
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS https://app.scopeguard.app/api/health > /tmp/health.json; then
              cat /tmp/health.json
              exit 0
            fi
            echo "attempt $i failed, retrying..."
            sleep 5
          done
          echo "health check did not return 200" >&2
          exit 1
